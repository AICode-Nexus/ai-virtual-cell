name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run P0 prototype demos
        working-directory: src/innovations
        run: |
          python3 demo_dual_gate.py
          python3 demo_llps.py
          python3 demo_integrated.py
